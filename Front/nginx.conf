server {
    listen 80;
    server_name localhost;

    # Устанавливаем кодировку для всех ответов
    charset utf-8;

    # Корневая папка со статикой
    root /usr/share/nginx/html;
    index index.html;

    # Проксирование запросов к /api на бэкенд
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Явно указываем кодировку для ответов от бэкенда (если бэкенд не отдаёт)
        proxy_set_header Accept-Encoding "";
        proxy_set_header Content-Type "application/json; charset=utf-8";
    }

    # Все остальные запросы (включая корень) отдают статику
    location / {
        try_files $uri $uri/ /index.html;
        # Добавляем заголовок для HTML-страниц, чтобы браузер точно использовал UTF-8
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Для JS и CSS тоже добавим правильный Content-Type с charset
    location ~* \.(js|css)$ {
        add_header Content-Type "$content_type; charset=utf-8";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}