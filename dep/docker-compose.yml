name: traineeship

services:
  postgres:
    image: postgres:15-alpine
    container_name: traineeship_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345678}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traineeship_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  image_migrate:
    image: postgres:15-alpine
    container_name: traineeship_image_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD:-12345678}
    volumes:
      - ../image_service/migrations/initial_001.sql:/migrations/initial_001.sql:ro
    entrypoint: >
      sh -c "psql -h postgres -U postgres -d imageservice -v ON_ERROR_STOP=1 -f /migrations/initial_001.sql"
    restart: "no"

  image_app:
    build:
      context: ../image_service
      dockerfile: Dockerfile
    container_name: traineeship_image_app
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      image_migrate:
        condition: service_completed_successfully
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      DB_NAME: imageservice
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      IMAGE_STORAGE_PATH: /data/images
      NOTIFY_SERVICE_URL: ${NOTIFY_SERVICE_URL:-http://10.64.10.237:8080}
      EXTERNAL_URL: http://localhost:3000/#/moderation
      DEFAULT_LOGS_PATH: logs/default
      CRITICAL_LOGS_PATH: logs/critical
      LOGGER_DEBUG: "true"
      JWT_SECRET: ${JWT_SECRET:-changethiskey!!!}
      JWT_ACCESS_TTL: "30s"
      JWT_REFRESH_TTL: "180m"
      TG_ADMIN_ID: "924956695"
    volumes:
      - image_data:/data/images
      - ../image_service/logs:/root/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - app

  image_frontend:
    build:
      context: ../image_service/web
      dockerfile: Dockerfile
    container_name: traineeship_image_frontend
    ports:
      - "3000:80"
    depends_on:
      image_app:
        condition: service_healthy
    restart: unless-stopped

  feed_backend:
    build:
      context: ../feed_service/backend
      dockerfile: Dockerfile
    container_name: traineeship_feed_backend
    ports:
      - "8070:8070"
    depends_on:
      postgres:
        condition: service_healthy
      image_app:
        condition: service_healthy
    environment:
      DEPLOYMENT_CONFIG: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-12345678}
      DB_NAME: feedservice
      DB_SSLMODE: disable
      BACKEND_PORT: "8070"
      BACKEND_HOST: 0.0.0.0:8070
      FEED_SERVICE_JWT_SECRET: ${FEED_SERVICE_JWT_SECRET:-Vj1WlmufcUengSqzIINyliPacXQXbSj0YqfTSYI3iWZ}
      NOTIFICATION_SERVICE_URL: ${NOTIFY_SERVICE_URL:-http://10.64.10.237:8080}/api
      IMAGE_SERVICE_URL: http://image_app:8080/api
      SMTP_HOST: smtp.mail.ru
      SMTP_PORT: "465"
      SMTP_EMAIL: rbsimageservice@mail.ru
      SMTP_PASSWORD: jKk0fTUrE4EVwGFKodK8
      EMAIL_HOST: http://localhost:3001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - backend

  feed_frontend:
    build:
      context: ../feed_service/frontend
      dockerfile: Dockerfile
    container_name: traineeship_feed_frontend
    stop_signal: SIGQUIT
    ports:
      - "3001:80"
    depends_on:
      feed_backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  image_data:
